# Trivy secret-scanner config — auto-loaded from the working directory by
# every trivy invocation in CI (pr-checks, release, weekly security sweep).
#
# Allow-rules suppress KNOWN NON-SECRETS only; each entry must pin the exact
# content so a real leaked key can never match. Never allow by path alone.
allow-rules:
  # ssh2's hardcoded Ed25519 PRIVATE KEY fixture (lib/protocol/crypto.js):
  # used at import time to feature-detect crypto.sign/verify Ed25519 support.
  # It is public upstream in the ssh2 repo and ends up inlined in the Next.js
  # server chunks the image scan flags.
  - id: ssh2-ed25519-feature-probe
    description: ssh2 public Ed25519 feature-detection fixture, not a credential
    regex: MC4CAQAwBQYDK2VwBCIEIHKj\+sVa9WcD/q2DJUJaf43Kptc8xYuUQA4bOFj9vC8T
