name: Publish image

# Public image build for the open-source snapshot. Builds the Dockerfile and
# pushes ghcr.io/blake-dk/unifi-captive-portal-suite:latest (+ a :sha tag) on
# every push to main, and on manual dispatch. No secrets required: the
# update-check token is an optional BuildKit secret (required=false in the
# Dockerfile) and is simply absent here, so the in-app update check is off —
# correct for a self-built public image.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: publish-image
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr push
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        # buildx's own pusher (`--push`) rather than classic build+push: the
        # classic path hit a GHCR "unknown blob" error on a brand-new
        # package's first pushes (cross-repo blob mount for a shared base
        # layer). A transient failure is retried up to 3×.
        run: |
          sha="$(git rev-parse HEAD)"
          build_time="$(git log -1 --format=%cI "$sha")"
          repo="ghcr.io/blake-dk/unifi-captive-portal-suite"
          for attempt in 1 2 3; do
            echo "==> Build+push attempt $attempt/3 (sha $sha)"
            if docker buildx build \
                --build-arg GIT_SHA="$sha" \
                --build-arg BUILD_TIME="$build_time" \
                --tag "$repo:latest" \
                --tag "$repo:$sha" \
                --push .; then
              break
            fi
            echo "==> Attempt $attempt failed"
            [ "$attempt" = 3 ] && { echo "all attempts failed" >&2; exit 1; }
            sleep 30
          done

      - name: Runner disk cleanup
        if: always()
        run: |
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "^ghcr.io/blake-dk/unifi-captive-portal-suite:" \
            | xargs -r docker rmi || true
          docker image prune -f
          docker builder prune -f --keep-storage 20GB
