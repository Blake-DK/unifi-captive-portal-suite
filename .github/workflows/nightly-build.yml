name: Nightly build

# The nightly branch is the fast-iteration line: push → image, nothing else.
# Deliberately NO test/typecheck/security gates, NO version bump, and NO
# tags — those all live on develop (PR-gated) and main (release-gated); a
# nightly host trades those guarantees for build turnaround. The only jobs a
# nightly push triggers are in this file (ci.yml/security.yml are branch-
# filtered to develop/main), and the only artifact is the :nightly image.
# Hosts opt in with `git checkout nightly` + IMAGE_TAG="nightly" in .env;
# update.sh and the in-app update check (channel "Nightly") follow the
# branch head by commit SHA, since there are no nightly version tags.

on:
  push:
    branches:
      - nightly

concurrency:
  # Rapid pushes coalesce; only the newest state matters on nightly.
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # ghcr push
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: nightly

      - name: Log in to container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image (:nightly only)
        # `docker buildx build --push` (BuildKit's own registry pusher), not
        # classic `docker build` + `docker push`: the classic push path hit
        # a reproducible GHCR "unknown blob" error on this repo's first
        # pushes — a cross-repo blob-mount bug for a shared base-image layer
        # against a brand-new package. buildx's pusher doesn't take that
        # code path. No :sha tag (unlike develop): nightly churns too fast —
        # per-push tags would silt up the registry and the runner host's
        # disk.
        env:
          # Read-only repo token, baked encrypted into the image (BuildKit
          # secret — see the Dockerfile). Absent secret = feature skipped.
          UPDATE_CHECK_TOKEN: ${{ secrets.UPDATE_CHECK_TOKEN }}
        run: |
          sha="$(git rev-parse HEAD)"
          build_time="$(git log -1 --format=%cI "$sha")"
          for attempt in 1 2 3; do
            echo "==> Build+push attempt $attempt/3 (sha $sha)"
            if docker buildx build \
                --build-arg GIT_SHA="$sha" \
                --build-arg BUILD_TIME="$build_time" \
                --build-arg CHANNEL=nightly \
                --secret id=update_check_token,env=UPDATE_CHECK_TOKEN \
                --tag "ghcr.io/blake-dk/unifi-captiveportal:nightly" \
                --push .; then
              break
            fi
            echo "==> Attempt $attempt failed"
            [ "$attempt" = 3 ] && { echo "all attempts failed" >&2; exit 1; }
            sleep 30
          done

      - name: Runner disk cleanup
        # The runners share this host's Docker daemon, and every build leaves
        # debris behind: the pushed tags stay local (the registry already has
        # them), superseded images go dangling, and the BuildKit cache grows
        # without bound (it reached 74GB once). Local repo tags are safe to
        # drop — rmi refuses while a running container uses one, and the
        # BuildKit layer cache survives rmi, so the next build stays warm.
        # The cache is capped rather than emptied for the same reason. Keep
        # this step body identical across the three build workflows.
        if: always()
        run: |
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep "^ghcr.io/blake-dk/unifi-captiveportal:" \
            | xargs -r docker rmi || true
          docker image prune -f
          docker builder prune -f --keep-storage 20GB
